name: Build Tizen TV App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Build WGT package
        run: |
          cd family-school-tv/src
          zip -r ../../FamilySchool.wgt .
          cd ../..
          echo "WGT package created!"
          ls -la FamilySchool.wgt

      - name: Upload WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: FamilySchool-TV
          path: FamilySchool.wgt
          retention-days: 30
